<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIM Pro - Manual Submit</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #002f6c; color: white; padding: 15px 25px; margin: -25px -25px 20px -25px; border-radius: 12px 12px 0 0; }
        .top-bar input, .top-bar select { padding: 8px; border-radius: 4px; border: none; outline: none; }

        .registration-box { background: #ffffff; border: 1px solid #d1d9e6; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        .btn-add { background: #2e7d32; width: 100%; margin-top: 15px; font-size: 1.1rem; }
        .btn-ref { background: #f57c00; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8f9fa; text-align: left; padding: 12px; border-bottom: 3px solid #002f6c; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        @keyframes highlightPulse {
            0% { background-color: #ffffff; }
            50% { background-color: #d4edda; }
            100% { background-color: #ffffff; }
        }
        .matched-row { animation: highlightPulse 2s infinite; font-weight: bold; }

        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-family: monospace; font-size: 0.75rem; border: 1px solid; }
        .status-CLS { background: #eeeeee; color: #616161; border-color: #e0e0e0; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div><strong>OPERATOR:</strong> <input type="text" id="opName" placeholder="Name"></div>
        <div id="syncStatus">📡 Connecting...</div>
        <div><strong>ROLE:</strong> 
            <select id="roleSelector" onchange="updateUI()">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>
    </div>

    <div class="registration-box" onkeydown="if(event.key === 'Enter') processRecord()">
        <div class="form-grid">
            <div><label>RIM ID</label><input type="text" id="rimId" maxlength="14" placeholder="Type or Scan..."></div>
            <div><label>Location</label><input type="text" id="loc" placeholder="Aisle/Shelf"></div>
            <div><label>Status</label>
                <select id="stat">
                    <option value="INBOUND">INBOUND</option>
                    <option value="PUT">PUT</option>
                    <option value="TAG">TAG</option>
                    <option value="AUD">AUD</option>
                    <option value="CLS">CLS</option>
                </select>
            </div>
        </div>
        <button class="btn btn-add" onclick="processRecord()">Register Pallet (Enter)</button>
    </div>

    <div class="registration-box" style="border-color: #f57c00;">
        <label><strong>Bulk Cross-Reference (CLS Match)</strong></label>
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <input type="file" id="bulkUpload" accept=".csv, .txt">
            <button class="btn btn-ref" onclick="runCrossReference()">Run Cross-Ref</button>
        </div>
        <p id="refResult" style="font-size: 0.8rem; margin-top: 5px; color: #666;"></p>
    </div>

    <table id="recordTable">
        <thead>
            <tr>
                <th>Time</th>
                <th>Operator</th>
                <th>RIM ID</th>
                <th>Location</th>
                <th>Status</th>
                <th id="adminActionHeader" class="hidden">Actions</th>
            </tr>
        </thead>
        <tbody id="mainTable"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC6UnjfA4JntuFFPL7zPo64QNSTTdDbvaQ",
        authDomain: "rim-logistics.firebaseapp.com",
        databaseURL: "https://rim-logistics-default-rtdb.firebaseio.com",
        projectId: "rim-logistics",
        storageBucket: "rim-logistics.firebasestorage.app",
        messagingSenderId: "440070923711",
        appId: "1:440070923711:web:f02d58467098390ff8ad0a",
        measurementId: "G-TWM27F18EL"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const recordsRef = db.ref('warehouse_records');
    let currentMatches = [];

    recordsRef.on('value', (snapshot) => {
        renderTable(snapshot.val());
        document.getElementById('syncStatus').innerText = "✅ Cloud Active";
    });

    function processRecord() {
        const name = document.getElementById('opName').value.trim();
        const rim = document.getElementById('rimId').value.trim().toUpperCase();
        
        if (!name) return alert("Please enter Operator Name.");
        if (rim.length !== 14 || !rim.startsWith("RIM")) return alert("Invalid RIM ID. Must be 14 chars starting with RIM.");

        recordsRef.push({
            op: name,
            time: new Date().toLocaleString(),
            rim: rim,
            loc: document.getElementById('loc').value || "TBD",
            status: document.getElementById('stat').value
        });
        
        document.getElementById('rimId').value = '';
        document.getElementById('rimId').focus();
    }

    function runCrossReference() {
        const fileInput = document.getElementById('bulkUpload');
        if (!fileInput.files[0]) return alert("Select a file first.");

        const reader = new FileReader();
        reader.onload = function(e) {
            const uploadedIds = e.target.result.split(/[\n,]+/).map(id => id.trim().toUpperCase()).filter(id => id.length > 0);
            recordsRef.once('value', (snapshot) => {
                const cloudData = snapshot.val();
                if (!cloudData) return;
                const clsMatches = [];
                currentMatches = [];
                Object.values(cloudData).forEach(r => {
                    if (uploadedIds.includes(r.rim) && r.status === "CLS") {
                        clsMatches.push(r);
                        currentMatches.push(r.rim);
                    }
                });
                renderTable(cloudData);
                if (clsMatches.length > 0) {
                    exportFilteredCSV(clsMatches);
                    document.getElementById('refResult').innerText = `✅ Matches Found: ${clsMatches.length}`;
                } else {
                    document.getElementById('refResult').innerText = "❌ No 'CLS' matches.";
                }
            });
        };
        reader.readAsText(fileInput.files[0]);
    }

    function renderTable(data) {
        const tableBody = document.getElementById('mainTable');
        const role = document.getElementById('roleSelector').value;
        tableBody.innerHTML = '';
        if (!data) return;
        Object.keys(data).reverse().forEach(key => {
            const r = data[key];
            const rowClass = currentMatches.includes(r.rim) ? 'matched-row' : '';
            let actions = (role === 'admin') ? `<td><button onclick="deleteEntry('${key}')" style="color:red; cursor:pointer;">Del</button></td>` : '';
            tableBody.innerHTML += `<tr class="${rowClass}">
                <td style="color:#888; font-size:0.7rem;">${r.time}</td>
                <td>${r.op}</td>
                <td><strong>${r.rim}</strong></td>
                <td>${r.loc}</td>
                <td><span class="badge status-${r.status}">${r.status}</span></td>
                ${actions}
            </tr>`;
        });
    }

    function exportFilteredCSV(dataList) {
        let csv = "Time,Operator,RIM_ID,Location,Status\n";
        dataList.forEach(r => csv += `"${r.time}","${r.op}","${r.rim}","${r.loc}","${r.status}"\n`);
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Audit_Matches.csv`;
        a.click();
    }

    function updateUI() {
        const role = document.getElementById('roleSelector').value;
        document.getElementById('adminActionHeader').classList.toggle('hidden', role !== 'admin');
        recordsRef.once('value', (s) => renderTable(s.val()));
    }

    function deleteEntry(key) {
        if(confirm("Delete record?")) db.ref('warehouse_records/' + key).remove();
    }
</script>

</body>
</html>
